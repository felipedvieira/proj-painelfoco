<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel Foco - login</title>
    <link rel="stylesheet" href="style.css" type="text/css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>

<body>
    
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
    <div class="bg-shape"></div>
    <div class="hero">
        <div class="title">
            <img src="logo.png" alt="" class="logo">
            <h1 class="h1-title">Painel Foco</h1>
        </div>
        <div class="login-flex">
            <form>
                <div class="login-input">
                <select class="select-login" name="origem" id="origem" placeholder="Origem">
                    <option value="" disabled selected>Origem</option>
                    <option value="Estudante">
                        Estudante
                    </option>
                    <option value="Mentor">
                        Mentor
                    </option>
                </select>
                <input class="input-login" type="text" name="username" id="username" placeholder="Usuário"> 
                <input class="input-login" type="password" name="password" id="password" placeholder="Senha" >
                <input class="button-login" type="button" id="login" name="login" value="Login" onclick="Redirecionar()">
                </div>
            </form>
        <button class="signup" id="openButton">Primeiro acesso? Cadastre-se aqui.</button>
            
            <dialog id="modalDialog" class="center">
                <button id="closeButton" style="float: right;">X</button>
                <h2>Formulário de Cadastro:</h2>
                
                <form>
                    Primeiro Nome:<br>
                <input type="text" name="firstname" placeholder="Nome" class="input-login">
            <br>
                Último Sobrenome:<br>
                <input type="text" name="lastname" placeholder="Sobrenome" class="input-login">
                <br><br>
                Tipo de Conta:<br>
            <input type="radio" id="Estudante" name="account-type">
            <label for="Estudante">Estudante</label>
            <input type="radio" id="Mentor" name="account-type">
            <label for="Mentor">Mentor</label>
        <input type="submit" value="Submit">
            </dialog>


    
    </div>
    </div>


<script>

    const dialog = document.querySelector("#modalDialog");
    const open = document.querySelector("#openButton");
    const close = document.querySelector("#closeButton");

    open.addEventListener("click", (e) => {
        dialog.showModal();
    });

    close.addEventListener("click", (e) => {
        dialog.close();
    });

    dialog.addEventListener("click", (e) => {
        if(event.target === dialog) {
            dialog.close();
        }
    });

function Redirecionar(){
    const valor = document.getElementById("origem").value;

    if(valor === "Estudante"){
        window.location.href = "Dashboard.html";
    } else if (valor === "Mentor"){
        window.location.href = "MentorDashboard.html";
    } else {
        alert("Selecione a origem.");
    }
}
</script>
    
</body>
</html>
