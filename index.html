<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel Foco - login</title>
    <link rel="stylesheet" href="style.css" type="text/css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>

<body>
    
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
    <div class="bg-shape"></div>
    <div class="hero">
        <div class="title">
            <img src="logo.png" alt="" class="logo">
            <h1 class="h1-title">Painel Foco</h1>
        </div>
        <div class="login-flex">
            <form action="">
                <div class="login-input">
                <select class="select-login" name="origem" id="origem" placeholder="Origem">
                    <option value="" disabled selected>Origem</option>
                    <option value="Estudante">
                        Estudante
                    </option>
                    <option value="Mentor">
                        Mentor
                    </option>
                </select>
                <input class="input-login" type="text" name="username" id="username" placeholder="Usuário"> 
                <input class="input-login" type="password" name="password" id="password" placeholder="Senha" >
                <input class="button-login" type="button" id="login" name="login" value="Login">
                </div>
            </form>
        
    <div class="cadastro hide">
        <button id="close" style="float: right;">X</button>
        <form action="">
            Primeiro Nome:<br>
            <input type="text" name="firstname" placeholder="Nome" class="input-login">
            <br>
             Último Sobrenome:<br>
            <input type="text" name="lastname" placeholder="Sobrenome" class="input-login">
            <br><br>
            Tipo de Conta:<br>
            <input type="radio" id="Estudante" name="account-type">
            <label for="Estudante">Estudante</label>
            <input type="radio" id="Mentor" name="account-type">
            <label for="Mentor">Mentor</label>
        <input type="submit" value="Submit">
        </form>
    </div>
    <button class="signup" id="show">Primeiro acesso? Cadastre-se aqui.</button>
    </div>
    </div>
<script>
$('#show').on('click', function () {
    $('.cadastro').show();
    $(this).hide();
})

$('#close').on('click', function () {
    $('.cadastro').hide();
    $('#show').show();
})
</script>
    
</body>
</html>
