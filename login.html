<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel Foco - login</title>
    <link rel="stylesheet" href="style.css" type="text/css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="bg-shape"></div>
    <div class="hero">
        <div class="title">
            <img src="logo.png" alt="" class="logo">
            <h1 class="h1-title">Painel Foco</h1>
        </div>
        
            <form action="">
                <div class="login-input">
                <select class="select-login" name="origem" id="origem" placeholder="Origem">
                    <option value="" disabled selected>Origem</option>
                    <option value="Estudante">
                        Estudante
                    </option>
                    <option value="Mentor">
                        Mentor
                    </option>
                <input class="input-login" type="text" name="username" id="username" placeholder="Usuário">
                <input class="input-login" type="password" name="password" id="password" placeholder="Senha" >
                <input class="button-login" type="button" id="login" name="login" value="Login">
            </form>
        </div>
    </div>
</body>
